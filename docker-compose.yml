version: '3.8'

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: locusdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/locusdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres

  frontend:
    build: ./frontend/user-addr-manager
    ports:
      - "5173:80"
    depends_on:
      - backend